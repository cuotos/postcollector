name: Docker

on:
  push:
    # Commits on main are published tagged with the commit SHA and `edge`.
    branches:
      - main

    # `v1.2.3` tags are published as releases (tagged `latest` and the git tag).
    tags:
      - v*

  # Run tests for any PRs.
  pull_request:

env:
  # TODO: Change variable to your image's name.
  IMAGE_NAME: image

jobs:
  # Run tests for every push and pull request.
  test:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

  # Push image to GitHub Package Registry.
  # See also https://docs.docker.com/docker-hub/builds/
  push:

    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build . --file Dockerfile --tag image

      - name: Log into registry
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          IMAGE_ID=${{ github.repository }}

          if [[ "${{ github.ref }}" == "refs/tags/"* ]]; then
            # Release: tag the image with the git tag and `latest`.
            GIT_TAG=${{ github.ref_name }}
            echo "Releasing $IMAGE_ID with tags: $GIT_TAG, latest"

            docker tag image $IMAGE_ID:$GIT_TAG
            docker tag image $IMAGE_ID:latest
            docker push $IMAGE_ID:$GIT_TAG
            docker push $IMAGE_ID:latest
          else
            # Commit on main: tag the image with the commit SHA and `edge`.
            SHA=${{ github.sha }}
            echo "Publishing $IMAGE_ID with tags: $SHA, edge"

            docker tag image $IMAGE_ID:$SHA
            docker tag image $IMAGE_ID:edge
            docker push $IMAGE_ID:$SHA
            docker push $IMAGE_ID:edge
          fi
