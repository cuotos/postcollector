name: Docker

on:
  push:
    # Commits on main are published tagged with the commit SHA and `edge`.
    branches:
      - main

    # `v1.2.3` tags are published as releases (tagged `latest` and the git tag).
    tags:
      - v*

  # Run tests for any PRs.
  pull_request:

env:
  # TODO: Change variable to your image's name.
  IMAGE_NAME: image

jobs:
  # Run tests for pull requests and commits on main. Tags are skipped: the
  # commit a tag points at was already tested when it landed on main.
  test:

    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

  # Build and publish the image for commits on main, tagged with the commit
  # SHA and `edge`.
  push:

    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v5

      - name: Build image
        run: docker build . --file Dockerfile --tag image

      - name: Log into registry
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ github.actor }} --password-stdin

      - name: Push image
        run: |
          IMAGE_ID=${{ github.repository }}
          SHA=${{ github.sha }}
          echo "Publishing $IMAGE_ID with tags: $SHA, edge"

          docker tag image $IMAGE_ID:$SHA
          docker tag image $IMAGE_ID:edge
          docker push $IMAGE_ID:$SHA
          docker push $IMAGE_ID:edge

  # Release a `v*` tag by adding `latest` and the git tag to the EXISTING
  # image already built for the tagged commit (found by its SHA). The image
  # is not rebuilt — tags are added to the registry manifest directly.
  release:

    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Log into registry
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u ${{ github.actor }} --password-stdin

      - name: Add release tags to existing image
        run: |
          IMAGE_ID=${{ github.repository }}
          SHA=${{ github.sha }}
          GIT_TAG=${{ github.ref_name }}
          echo "Tagging existing image $IMAGE_ID:$SHA as $GIT_TAG and latest"

          docker buildx imagetools create \
            --tag $IMAGE_ID:$GIT_TAG \
            --tag $IMAGE_ID:latest \
            $IMAGE_ID:$SHA
